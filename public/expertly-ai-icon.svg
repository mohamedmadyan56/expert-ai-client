<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: fully black, no padding -->
  <rect width="100" height="100" rx="18" ry="18" fill="url(#bgGrad)"/>

  <!-- Subtle gold border -->
  <rect width="100" height="100" rx="18" ry="18" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Letter E - bold and centered -->
  <g filter="url(#glow)" fill="url(#goldGrad)">
    <!-- Top bar -->
    <rect x="28" y="22" width="44" height="9" rx="3"/>
    <!-- Middle bar (shorter) -->
    <rect x="28" y="45.5" width="36" height="9" rx="3"/>
    <!-- Bottom bar -->
    <rect x="28" y="69" width="44" height="9" rx="3"/>
    <!-- Vertical spine -->
    <rect x="28" y="22" width="9" height="56" rx="3"/>
  </g>

  <!-- AI dot accent -->
  <circle cx="74" cy="72" r="4.5" fill="url(#goldGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="74" cy="72" r="2.5" fill="#1a1a1a"/>
</svg>
